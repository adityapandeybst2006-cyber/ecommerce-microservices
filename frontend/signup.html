<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign Up | Shopping Bazar</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="shopping-bazar.css"></head>
<body class="auth-page"><header><a class="logo" href="index.html">SHOPPING <span>BAZAR</span></a><a class="back-link" href="index.html">← Continue shopping</a></header><main class="auth-main"><section class="auth-card"><p class="auth-label">CREATE ACCOUNT</p><h1>Join Shopping Bazar</h1><p class="auth-subtitle">Create your account for faster checkout and order updates.</p><form id="signupForm"><label>Your name<input id="name" type="text" autocomplete="name" placeholder="Enter your full name" required></label><label>Email address<input id="email" type="email" autocomplete="email" placeholder="you@example.com" required></label><label>Password<input id="password" type="password" autocomplete="new-password" minlength="6" placeholder="At least 6 characters" required></label><button class="button" type="submit">Create account →</button><p id="message" class="auth-message" aria-live="polite"></p></form><p class="auth-switch">Already have an account? <a href="login.html">Login</a></p></section></main><script src="auth.js"></script></body></html>
