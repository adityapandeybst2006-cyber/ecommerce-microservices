<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login | Shopping Bazar</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="shopping-bazar.css">
</head>

<body class="auth-page">

<header>
  <a class="logo" href="index.html">SHOPPING <span>BAZAR</span></a>
  <a class="back-link" href="index.html">← Continue shopping</a>
</header>

<main class="auth-main">

<section class="auth-card">

<p class="auth-label">WELCOME BACK</p>

<h1>Login to your account</h1>

<p class="auth-subtitle">
Enter your details to continue shopping.
</p>

<form id="loginForm">

<label>
Email
<input id="email" type="email" required>
</label>

<label>
Password
<input id="password" type="password" required>
</label>

<button type="submit">
Login
</button>

<p id="message"></p>

</form>

<p>
Don't have an account?
<a href="signup.html">Signup</a>
</p>

</section>

</main>

<script src="auth.js"></script>

</body>
</html>
